<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Phase Function — θ(n) = pₙ mod 2π</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0ddd5;
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 28px 0;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #f0ece2;
    text-shadow: 0 0 40px rgba(180, 160, 255, 0.3);
  }

  .subtitle {
    font-size: 11px;
    color: #8a8578;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .main {
    flex: 1;
    display: flex;
    min-height: 0;
    padding: 16px 28px 20px;
    gap: 20px;
  }

  .panel {
    background: rgba(15, 15, 22, 0.7);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8a8578;
    padding: 14px 18px 10px;
    flex-shrink: 0;
  }

  .left-panel {
    width: 42%;
    min-width: 300px;
  }

  .right-panel {
    flex: 1;
  }

  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  .canvas-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    padding: 8px;
  }

  .controls-bar {
    padding: 12px 28px 8px;
    display: flex;
    gap: 28px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ctrl label {
    font-size: 10px;
    color: #8a8578;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .ctrl input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #b8a4ff;
    box-shadow: 0 0 8px rgba(184,164,255,0.4);
  }

  .val {
    font-size: 12px;
    color: #c8b8ff;
    font-weight: 600;
    min-width: 36px;
  }

  .toggle-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    background: transparent;
    color: #8a8578;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: rgba(184,164,255,0.15);
    border-color: rgba(184,164,255,0.4);
    color: #c8b8ff;
  }

  .tooltip {
    position: fixed;
    z-index: 100;
    background: rgba(10,10,18,0.95);
    border: 1px solid rgba(184,164,255,0.3);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: #e0ddd5;
    pointer-events: none;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .tooltip .prime-num {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #c8b8ff;
    font-weight: 700;
  }

  .stats-line {
    font-size: 10px;
    color: #5a5550;
    padding: 0 18px 10px;
  }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .left-panel { width: 100%; min-height: 45%; }
  }
</style>
</head>
<body>

<header>
  <h1>Prime Phase Function</h1>
  <div class="subtitle">θ(n) = p<sub>n</sub> mod 2π — the angular walk of primes on the phasor circle</div>
</header>

<div class="controls-bar">
  <div class="ctrl">
    <label>Primes</label>
    <input type="range" id="count" min="50" max="10000" value="2000" step="50">
    <span class="val" id="count-val">2000</span>
  </div>
  <div class="ctrl">
    <label>Animate</label>
    <button class="toggle-btn" id="anim-btn">Off</button>
  </div>
  <div class="ctrl">
    <label>Density map</label>
    <button class="toggle-btn" id="density-btn">Show</button>
  </div>
  <div class="ctrl">
    <label>Connect chords</label>
    <button class="toggle-btn active" id="chord-btn">On</button>
  </div>
</div>

<div class="main">
  <div class="panel left-panel">
    <div class="panel-title">Phasor Circle — projection from above</div>
    <div class="canvas-wrap"><canvas id="circle-canvas"></canvas></div>
    <div class="stats-line" id="circle-stats"></div>
  </div>
  <div class="panel right-panel">
    <div class="panel-title">θ(n) vs n — prime index → angular position</div>
    <div class="canvas-wrap"><canvas id="theta-canvas"></canvas></div>
    <div class="stats-line" id="theta-stats"></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="prime-num" id="tt-prime"></div>
  <div id="tt-info"></div>
</div>

<script>
// --- Primes ---
function sieve(max) {
  const s = new Uint8Array(max + 1);
  const p = [];
  for (let i = 2; i <= max; i++) {
    if (!s[i]) { p.push(i); for (let j = i * i; j <= max; j += i) s[j] = 1; }
  }
  return p;
}
const ALL_PRIMES = sieve(110000);
const TWO_PI = 2 * Math.PI;

let primeCount = 2000;
let animating = false;
let showDensity = false;
let showChords = true;
let animOffset = 0;

// --- Canvas setup ---
function initCanvas(id) {
  const c = document.getElementById(id);
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    const rect = c.parentElement.getBoundingClientRect();
    c.width = rect.width * dpr;
    c.height = rect.height * dpr;
    c.style.width = rect.width + 'px';
    c.style.height = rect.height + 'px';
  }
  resize();
  window.addEventListener('resize', resize);
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  return { canvas: c, ctx, dpr, getSize: () => {
    return { w: c.width / dpr, h: c.height / dpr };
  }};
}

const circle = initCanvas('circle-canvas');
const theta = initCanvas('theta-canvas');

// --- Color ---
function hsl(h, s, l, a = 1) {
  return `hsla(${h},${s}%,${l}%,${a})`;
}

function primeColor(idx, total, gap) {
  const hue = 260 - (gap || 2) * 8;
  return hsl(Math.max(0, Math.min(300, hue)), 65, 62, 0.85);
}

// --- Draw phasor circle ---
function drawCircle(t) {
  const { ctx, getSize, canvas, dpr } = circle;
  const { w, h } = getSize();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.38;
  const primes = ALL_PRIMES.slice(0, primeCount);
  const visible = animating ? Math.min(primes.length, Math.floor(t)) : primes.length;

  // Background circle
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, TWO_PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#5a5550';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText('0', cx + r + 14, cy + 4);
  ctx.fillText('π', cx - r - 14, cy + 4);
  ctx.fillText('π/2', cx, cy - r - 8);
  ctx.fillText('3π/2', cx, cy + r + 14);

  // Density ring
  if (showDensity) {
    const bins = 72;
    const binCounts = new Array(bins).fill(0);
    for (let i = 0; i < visible; i++) {
      const angle = primes[i] % TWO_PI;
      const bin = Math.floor((angle / TWO_PI) * bins) % bins;
      binCounts[bin]++;
    }
    const maxBin = Math.max(...binCounts, 1);
    for (let b = 0; b < bins; b++) {
      const a0 = (b / bins) * TWO_PI - Math.PI / 2;
      const a1 = ((b + 1) / bins) * TWO_PI - Math.PI / 2;
      const intensity = binCounts[b] / maxBin;
      const outerR = r + 4 + intensity * 30;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 3, a0, a1);
      ctx.arc(cx, cy, outerR, a1, a0, true);
      ctx.closePath();
      ctx.fillStyle = hsl(260, 60, 50, intensity * 0.5);
      ctx.fill();
    }
  }

  // Chords
  if (showChords && visible > 1) {
    ctx.beginPath();
    for (let i = 0; i < visible - 1; i++) {
      const a1 = primes[i] % TWO_PI;
      const a2 = primes[i + 1] % TWO_PI;
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
    }
    ctx.strokeStyle = 'rgba(184,164,255,0.07)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Points
  for (let i = 0; i < visible; i++) {
    const angle = primes[i] % TWO_PI;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    const gap = i < primes.length - 1 ? primes[i + 1] - primes[i] : 2;
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, TWO_PI);
    ctx.fillStyle = primeColor(i, visible, gap);
    ctx.fill();
  }

  // Stats
  document.getElementById('circle-stats').textContent =
    `${visible} primes projected onto unit circle`;
}

// --- Draw theta(n) ---
function drawTheta(t) {
  const { ctx, getSize, canvas, dpr } = theta;
  const { w, h } = getSize();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const primes = ALL_PRIMES.slice(0, primeCount);
  const visible = animating ? Math.min(primes.length, Math.floor(t)) : primes.length;

  const padL = 50, padR = 20, padT = 10, padB = 34;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, padT);
  ctx.lineTo(padL, padT + plotH);
  ctx.lineTo(padL + plotW, padT + plotH);
  ctx.stroke();

  // Y axis labels (0 to 2π)
  ctx.fillStyle = '#5a5550';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'right';
  const yLabels = [0, Math.PI / 2, Math.PI, 3 * Math.PI / 2, TWO_PI];
  const yLabelText = ['0', 'π/2', 'π', '3π/2', '2π'];
  for (let i = 0; i < yLabels.length; i++) {
    const y = padT + plotH - (yLabels[i] / TWO_PI) * plotH;
    ctx.fillText(yLabelText[i], padL - 6, y + 4);
    if (i > 0) {
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(padL + plotW, y);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.stroke();
    }
  }

  // X axis label
  ctx.textAlign = 'center';
  ctx.fillText('n (prime index)', padL + plotW / 2, padT + plotH + 28);

  // Data points and connecting lines
  if (visible > 1) {
    // Lines
    ctx.beginPath();
    for (let i = 0; i < visible; i++) {
      const x = padL + (i / (primeCount - 1)) * plotW;
      const angle = primes[i] % TWO_PI;
      const y = padT + plotH - (angle / TWO_PI) * plotH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(184,164,255,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Points
  for (let i = 0; i < visible; i++) {
    const x = padL + (i / (primeCount - 1)) * plotW;
    const angle = primes[i] % TWO_PI;
    const y = padT + plotH - (angle / TWO_PI) * plotH;
    const gap = i < primes.length - 1 ? primes[i + 1] - primes[i] : 2;
    ctx.beginPath();
    ctx.arc(x, y, 1.8, 0, TWO_PI);
    ctx.fillStyle = primeColor(i, visible, gap);
    ctx.fill();
  }

  // Theta stats
  if (visible > 10) {
    const angles = primes.slice(0, visible).map(p => p % TWO_PI);
    const mean = angles.reduce((a, b) => a + b, 0) / angles.length;
    document.getElementById('theta-stats').textContent =
      `mean θ = ${mean.toFixed(3)} rad (uniform would be ${Math.PI.toFixed(3)})`;
  }
}

// --- Animation loop ---
let startTime = null;
function loop(ts) {
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) / 1000;
  const t = animating ? Math.min(elapsed * 60, primeCount) : primeCount;

  if (animating && t >= primeCount) {
    animating = false;
    document.getElementById('anim-btn').classList.remove('active');
    document.getElementById('anim-btn').textContent = 'Off';
  }

  drawCircle(t);
  drawTheta(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// --- Controls ---
document.getElementById('count').addEventListener('input', function() {
  primeCount = +this.value;
  document.getElementById('count-val').textContent = this.value;
  if (!animating) { drawCircle(primeCount); drawTheta(primeCount); }
});

document.getElementById('anim-btn').addEventListener('click', function() {
  animating = !animating;
  this.classList.toggle('active');
  this.textContent = animating ? 'On' : 'Off';
  if (animating) startTime = null;
});

document.getElementById('density-btn').addEventListener('click', function() {
  showDensity = !showDensity;
  this.classList.toggle('active');
});

document.getElementById('chord-btn').addEventListener('click', function() {
  showChords = !showChords;
  this.classList.toggle('active');
});

// --- Tooltip on theta chart ---
const ttEl = document.getElementById('tooltip');
document.getElementById('theta-canvas').addEventListener('mousemove', function(e) {
  const rect = this.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const { w, h } = theta.getSize();
  const padL = 50, padR = 20, padT = 10, padB = 34;
  const plotW = w - padL - padR;

  const n = Math.round(((mx - padL) / plotW) * (primeCount - 1));
  if (n >= 0 && n < primeCount && n < ALL_PRIMES.length) {
    const p = ALL_PRIMES[n];
    const angle = (p % TWO_PI).toFixed(4);
    ttEl.style.display = 'block';
    ttEl.style.left = (e.clientX + 16) + 'px';
    ttEl.style.top = (e.clientY - 10) + 'px';
    document.getElementById('tt-prime').textContent = `p${n + 1} = ${p}`;
    document.getElementById('tt-info').innerHTML = `θ = ${angle} rad<br>${p} mod 2π = ${angle}`;
  } else {
    ttEl.style.display = 'none';
  }
});

document.getElementById('circle-canvas').addEventListener('mousemove', function(e) {
  ttEl.style.display = 'none'; // Simple hide for circle; full raycasting would be heavy
});

document.addEventListener('mousemove', function(e) {
  if (!e.target.closest('canvas')) ttEl.style.display = 'none';
});

// Handle resize
window.addEventListener('resize', () => {
  setTimeout(() => {
    [circle, theta].forEach(({ canvas, ctx, dpr }) => {
      const rect = canvas.parentElement.getBoundingClientRect();
      const d = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = rect.width * d;
      canvas.height = rect.height * d;
    });
  }, 100);
});
</script>
</body>
</html>
